version: '3.8'

services:
  # ─────────────────────────────────────────────
  # LOCAL STELLAR NODE (sandbox network)
  # Issue #381 — provides isolated local blockchain
  # ─────────────────────────────────────────────
  stellar-local:
    image: stellar/quickstart:latest
    container_name: teachlink-stellar-local
    ports:
      - "8000:8000"   # Horizon API
      - "8001:8001"   # Friendbot (free test XLM)
    environment:
      - ENABLE_SOROBAN_RPC=true
    command: --local --enable-soroban-rpc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - teachlink-network

  # ─────────────────────────────────────────────
  # SANDBOX — full isolated test environment
  # Run: docker-compose up sandbox
  # ─────────────────────────────────────────────
  sandbox:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: teachlink-sandbox
    depends_on:
      stellar-local:
        condition: service_healthy
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    environment:
      - RUST_BACKTRACE=1
      - CARGO_TERM_COLOR=always
      - STELLAR_NETWORK=sandbox
      - STELLAR_HORIZON_URL=http://stellar-local:8000
      - STELLAR_SOROBAN_RPC_URL=http://stellar-local:8000/soroban/rpc
      - DEPLOYER_SECRET_KEY=SCZANGBA5YHTNYVS23C4QSQH5ODHVIMTQJZNFNLXFMG7VZ57SB42ONHU
      - TEST_ACCOUNT_1_SECRET=SDHOAMBNLGCE27Q64SHG6KBSSRMLV3QLVJSRMGM65JJXTVFVKGAL4LGS
      - TEST_ACCOUNT_2_SECRET=SBQPDFUGLMWJYEYXFRM5TQX3AX2BR47WKI8FDS2VAKZ4YKQZRP64FGP5
      - SANDBOX_BLOCK_TIME_MS=500
    working_dir: /workspace
    command: cargo test --all-features -- --test-threads=1
    networks:
      - teachlink-network

  # ─────────────────────────────────────────────
  # EXISTING SERVICES (unchanged)
  # ─────────────────────────────────────────────
  dev:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: teachlink-dev
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    environment:
      - RUST_BACKTRACE=1
      - CARGO_TERM_COLOR=always
    env_file:
      - .env
    working_dir: /workspace
    command: /bin/bash
    stdin_open: true
    tty: true
    networks:
      - teachlink-network

  builder:
    build:
      context: .
      target: builder
      dockerfile: Dockerfile
    container_name: teachlink-builder
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
    working_dir: /workspace
    command: cargo build --release --target wasm32-unknown-unknown
    networks:
      - teachlink-network

  test:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: teachlink-test
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    working_dir: /workspace
    command: cargo test --all-features
    networks:
      - teachlink-network

  lint:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: teachlink-lint
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
    working_dir: /workspace
    command: sh -c "cargo fmt --all -- --check && cargo clippy --all-targets --all-features -- -D warnings"
    networks:
      - teachlink-network

volumes:
  cargo-cache:
    driver: local
  target-cache:
    driver: local

networks:
  teachlink-network:
    driver: bridge
